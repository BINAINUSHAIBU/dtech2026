    <line x1="12" y1="13" x2="18" y2="13" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"></line>

    <line x1="6" y1="17" x2="18" y2="17" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"></line>

</svg>