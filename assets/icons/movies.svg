<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">

    <!-- Film Body -->
    <rect x="4" y="5" width="16" height="14" rx="2" stroke="#00D4FF" stroke-width="2"></rect>

    <!-- Top Film Holes -->
    <rect x="6" y="6.5" width="2" height="2" fill="#00D4FF"></rect>
    <rect x="10" y="6.5" width="2" height="2" fill="#00D4FF"></rect>
    <rect x="14" y="6.5" width="2" height="2" fill="#00D4FF"></rect>
    <rect x="18" y="6.5" width="1" height="2" fill="#00D4FF"></rect>

    <!-- Bottom Film Holes -->
    <rect x="6" y="15.5" width="2" height="2" fill="#00D4FF"></rect>
    <rect x="10" y="15.5" width="2" height="2" fill="#00D4FF"></rect>
    <rect x="14" y="15.5" width="2" height="2" fill="#00D4FF"></rect>
    <rect x="18" y="15.5" width="1" height="2" fill="#00D4FF"></rect>

    <!-- Play Symbol -->
    <polygon points="10,10 10,14 15,12" fill="#00D4FF"></polygon>

</svg>