<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTECH-TV WORLD ULTRA MAX X</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}


body{
background:#080808;
color:white;
overflow:hidden;
}



header{

height:70px;
background:#111;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #222;

}



.logo{

font-size:24px;
font-weight:bold;
color:#00d2ff;

}


.search{

width:350px;
padding:10px;
border-radius:25px;
border:none;
outline:none;

}



.container{

display:flex;
height:calc(100vh - 115px);

}



.sidebar{

width:250px;
background:#151515;
overflow:auto;
padding:20px;

}



.sidebar h3{

color:#00d2ff;
margin:15px 0 10px;

}



.sidebar button{

width:100%;
padding:12px;
margin-bottom:8px;
background:#222;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}



.sidebar button:hover{

background:#00d2ff;
color:black;

}



.main{

flex:1;
overflow:auto;
padding:20px;

}



.hero{

height:200px;
border-radius:20px;
background:linear-gradient(135deg,#004cff,#00d2ff);

display:flex;
align-items:center;
justify-content:center;

font-size:38px;
font-weight:bold;

margin-bottom:25px;

}



.player{

height:420px;
background:black;
border-radius:15px;
overflow:hidden;
margin-bottom:30px;

}



video{

width:100%;
height:100%;

}



.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;

}



.card{

background:#1a1a1a;
border-radius:12px;
padding:15px;
cursor:pointer;
transition:.3s;

}



.card:hover{

transform:scale(1.04);
background:#222;

}



.card img{

width:100%;
height:120px;
object-fit:contain;
background:white;
border-radius:8px;

}



.name{

margin-top:10px;
font-size:18px;

}



.info{

color:#999;
margin-top:5px;

}



.live{

display:inline-block;
margin-top:10px;
padding:5px 10px;
background:red;
border-radius:20px;
font-size:12px;

}



footer{

height:45px;
background:#111;
display:flex;
align-items:center;
justify-content:center;

}



@media(max-width:800px){

.sidebar{

width:180px;

}


.search{

width:180px;

}


.hero{

font-size:25px;

}

}



</style>

</head>



<body>


<header>

<div class="logo">
BTECH-TV WORLD ULTRA MAX X
</div>


<input 
class="search"
placeholder="Search Channel..."
onkeyup="searchChannel(this.value)"
>

</header>




<div class="container">


<div class="sidebar">


<h3>🌍 Countries</h3>

<div id="countries"></div>


<h3>📺 Categories</h3>

<div id="categories"></div>


<h3>🌐 Languages</h3>

<div id="languages"></div>


</div>




<div class="main">


<div class="hero">
SMART IPTV DASHBOARD
</div>



<div class="player">

<video 
id="video"
controls
autoplay>
</video>

</div>



<div id="channels" class="grid"></div>



</div>



</div>




<footer>
Modern IPTV Dashboard | BTECH-TV
</footer>




<script>


let CHANNELS=[];


let hls;



async function loadData(){


try{


let response=await fetch("data/channels.json");


if(!response.ok)
throw new Error("channels.json missing");



CHANNELS=await response.json();



renderChannels(CHANNELS);



await loadCountries();

await loadCategories();

await loadLanguages();



}

catch(error){


console.error(error);


document.getElementById("channels").innerHTML=
`
<div style="
padding:40px;
font-size:22px;
color:white">

Failed loading channels.json

</div>
`;

}


}






function renderChannels(list){


let html="";


list.forEach(c=>{


html+=`

<div class="card"
onclick="play('${c.stream}')">


<img src="${c.logo || ''}">


<div class="name">
${c.name}
</div>


<div class="info">
${c.country || ''}
</div>


<div class="info">
${c.category || ''}
</div>


<span class="live">
LIVE
</span>


</div>

`;


});



document.getElementById("channels").innerHTML=html;


}








function play(url){


let video=document.getElementById("video");



if(hls){

hls.destroy();

}



if(Hls.isSupported()){


hls=new Hls();

hls.loadSource(url);

hls.attachMedia(video);


}

else{


video.src=url;


}


video.play();


}








function searchChannel(q){


q=q.toLowerCase();


renderChannels(
CHANNELS.filter(c=>

c.name.toLowerCase()
.includes(q)

)

);


}







async function loadCountries(){


let data=
await fetch("data/countries.json")
.then(r=>r.json());



countries.innerHTML=
data.map(x=>

`
<button onclick="
filterCountry('${x.name}')
">

${x.flag} ${x.name}

</button>

`

).join("");



}






async function loadCategories(){


let data=
await fetch("data/categories.json")
.then(r=>r.json());



categories.innerHTML=
data.map(x=>

`
<button onclick="
filterCategory('${x.name}')
">

${x.icon} ${x.name}

</button>

`

).join("");



}






async function loadLanguages(){


let data=
await fetch("data/languages.json")
.then(r=>r.json());



languages.innerHTML=
data.map(x=>

`
<button>

${x.flag} ${x.name}

</button>

`

).join("");



}







function filterCountry(name){


renderChannels(
CHANNELS.filter(c=>c.country==name)
);


}





function filterCategory(name){


renderChannels(
CHANNELS.filter(c=>c.category==name)
);


}






loadData();


</script>


</body>

</html>
